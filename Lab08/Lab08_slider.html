<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 08 - Slider</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f2f5;
            font-family: Arial, sans-serif;
        }

        .slider-container {
            position: relative;
            width: 800px;
            max-width: 100%;
            background-color: #fff;
            border: 5px solid #000;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .slider-wrapper {
            position: relative;
            width: 100%;
            height: 450px; 
            background-color: #333;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .slide.active {
            opacity: 1;
            position: relative;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }


        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(0, 0, 0, 0.4);
            color: white;
            border: none;
            font-size: 24px;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 3px;
            user-select: none;
            transition: background-color 0.3s;
            z-index: 10;
        }

        .nav-btn:hover {
            background-color: rgba(0, 0, 0, 0.8);
        }

        .prev-btn {
            left: 15px;
        }

        .next-btn {
            right: 15px;
        }

        .dots-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px 0;
            background-color: #fff;
            gap: 10px;
        }

        .dot {
            width: 12px;
            height: 12px;
            background-color: #bbb;
            border-radius: 50%;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .dot.active, .dot:hover {
            background-color: #717171;
        }
    </style>
</head>
<body>

    <div class="slider-container">
        <div class="slider-wrapper">
            <div class="slide active">
                <img src="img/slide_1.jpeg" alt="">
            </div>
            <div class="slide">
                <img src="img/slide_2.jpg" alt="">
            </div>
            <div class="slide">
                <img src="img/slide_3.jpg" alt="">
            </div>
            <div class="slide">
                <img src="img/slide_4.jpg" alt="">
            </div>
            <div class="slide">
                <img src="img/slide_5.jpg" alt="">
            </div>

            <button class="nav-btn prev-btn" onclick="changeSlide(-1)">&lt;</button>
            <button class="nav-btn next-btn" onclick="changeSlide(1)">&gt;</button>
        </div>

        <div class="dots-container">
            <span class="dot active" onclick="currentSlide(0)"></span>
            <span class="dot" onclick="currentSlide(1)"></span>
            <span class="dot" onclick="currentSlide(2)"></span>
            <span class="dot" onclick="currentSlide(3)"></span>
            <span class="dot" onclick="currentSlide(4)"></span>
        </div>
    </div>

    <script>
        let currentIdx = 0;
        const slides = document.querySelectorAll('.slide');
        const dots = document.querySelectorAll('.dot');
        const totalSlides = slides.length;

        function updateSlider() {
            slides.forEach(slide => slide.classList.remove('active'));
            dots.forEach(dot => dot.classList.remove('active'));

            slides[currentIdx].classList.add('active');
            dots[currentIdx].classList.add('active');
        }

        function changeSlide(direction) {
            currentIdx += direction;

            if (currentIdx >= totalSlides) {
                currentIdx = 0; 
            } else if (currentIdx < 0) {
                currentIdx = totalSlides - 1; 
            }

            updateSlider();
        }

        function currentSlide(index) {
            currentIdx = currentIdx+index;
            updateSlider();
        }
     
    </script>

</body>
</html>
